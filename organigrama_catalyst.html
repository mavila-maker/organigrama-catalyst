<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ca.taly.st — Organigrama</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#f0f0f0;font-family:'Inter','Helvetica Neue',Arial,sans-serif;overflow:hidden;height:100vh;width:100vw;user-select:none}

/* SPLASH */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:#0d0d0d;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;
  transition:opacity .7s ease;
}
#splash.fade-out{opacity:0;pointer-events:none}
#splash img{
  width:clamp(160px,28vw,340px);
  object-fit:contain;
  opacity:0;
  transform:scale(.88);
  transition:opacity .9s ease, transform .9s ease;
}
#splash img.visible{opacity:1;transform:scale(1)}
#splash-hint{
  margin-top:32px;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;color:#333;
  opacity:0;transition:opacity 1.2s ease .6s;
}
#splash-hint.visible{opacity:1}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(13,13,13,.92);backdrop-filter:blur(12px);border-bottom:1px solid #1c1c1c}
.logo{font-size:16px;font-weight:700;letter-spacing:.06em;color:#fff}
.logo .dot{color:#444}
.hint{font-size:10px;color:#3a3a3a;letter-spacing:.07em}
.hint b{color:#555;font-weight:500}

/* CANVAS */
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;cursor:grab;overflow:hidden}
#canvas:active{cursor:grabbing}
#world{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:center center}

/* SVG */
#svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none}
.l-main{stroke:#252525;stroke-width:1.5;fill:none;transition:stroke .3s}
.l-child{stroke:#1e1e1e;stroke-width:1;fill:none;stroke-dasharray:5 4}

/* NODE BASE */
.nd{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:10;transition:z-index 0s}
.nd:hover{z-index:30}

/* AVATAR */
.av-wrap{border-radius:50%;padding:3px;background:conic-gradient(#2a2a2a,#181818,#2a2a2a);transition:padding .2s,box-shadow .2s}
.nd:hover .av-wrap,.nd.open .av-wrap{padding:4px;box-shadow:0 0 0 2px rgba(255,255,255,.1),0 4px 24px rgba(0,0,0,.6)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;letter-spacing:.02em;color:#bbb;overflow:hidden;border:1.5px solid #282828;transition:border-color .2s;flex-shrink:0;position:relative}
.nd:hover .av,.nd.open .av{border-color:#444}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.av .ini{font-size:inherit}

/* LABELS */
.lbl{text-align:center;margin-top:6px;pointer-events:none;max-width:110px}
.nm{font-size:10.5px;font-weight:600;color:#ddd;line-height:1.25;white-space:nowrap}
.rl{font-size:9px;color:#555;margin-top:1px;white-space:nowrap}
.tg{font-size:7.5px;color:#383838;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;white-space:nowrap}

/* EXPAND INDICATOR */
.exp{width:14px;height:14px;border-radius:50%;background:#181818;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;margin-top:5px;font-size:9px;color:#444;transition:all .25s;flex-shrink:0}
.nd.open .exp{background:#fff;color:#000;transform:rotate(45deg);border-color:#fff}
.nd:hover .exp{border-color:#444;color:#777}

/* CENTER NODE */
.nd-ceo .av-wrap{background:conic-gradient(#333,#1a1a1a,#333)}
.nd-ceo .nm{font-size:13px;color:#fff}
.nd-ceo .rl{font-size:10px;color:#888}

/* ZOOM */
#zoom{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:5px;z-index:200}
.zb{width:34px;height:34px;background:#181818;border:1px solid #252525;border-radius:8px;color:#666;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;outline:none}
.zb:hover{background:#222;color:#ccc}

/* ENTER ANIMATION */
@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.5)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.nd-new{animation:popIn .25s cubic-bezier(.34,1.56,.64,1) both}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0d0d0d}::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
</style>
</head>

// ═══ STATE ═══════════════════════════════════════════════════════
let W = window.innerWidth, H = window.innerHeight;
let cx = W/2, cy = H/2 + 24;
let panX=0, panY=0, sc=1;
let isPan=false, panStart=null;
const openSet  = new Set();
const nodeEls  = {};
const nodePos  = {};
const nodeData = {};  // id -> data obj

// ═══ GEOMETRY ════════════════════════════════════════════════════
const PI2 = Math.PI*2;
const TAU = Math.PI;

function circlePos(ox,oy,r,i,n,startAngle=-Math.PI/2){
  const a = startAngle + (i/n)*PI2;
  return {x:ox+r*Math.cos(a), y:oy+r*Math.sin(a)};
}

function arcPos(ox,oy, parentX,parentY, r,i,n){
  // Direction from parent's parent toward parent
  const dx=ox-parentX, dy=oy-parentY;
  const base=Math.atan2(dy,dx);
  const spread = n===1?0 : Math.min(TAU*0.7, n*0.45);
  const start  = base - spread/2;
  const step   = n>1? spread/(n-1):0;
  const a = start+i*step;
  return {x:ox+r*Math.cos(a), y:oy+r*Math.sin(a)};
}

function levelRadius(depth){
  return [0,200,155,120][Math.min(depth,3)];
}
function avatarSize(depth){
  return [78,60,50,42][Math.min(depth,3)];
}

// ═══ VIEWPORT ════════════════════════════════════════════════════
const world  = document.getElementById('world');
const svgEl  = document.getElementById('svg');
const canvas = document.getElementById('canvas');

function applyTx(){
  const tx=`translate(${cx+panX}px,${cy+panY}px) scale(${sc})`;
  world.style.transform=tx;
  world.style.transformOrigin='0 0';
}
function zoom(f){sc=Math.min(2.5,Math.max(.3,sc*f));applyTx()}
function resetView(){panX=0;panY=0;sc=1;applyTx()}

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  zoom(e.deltaY<0?1.1:.91);
},{passive:false});

canvas.addEventListener('mousedown',e=>{
  if(e.target.closest('.nd')) return;
  isPan=true; panStart={x:e.clientX-panX,y:e.clientY-panY};
});
window.addEventListener('mousemove',e=>{
  if(!isPan)return;
  panX=e.clientX-panStart.x; panY=e.clientY-panStart.y; applyTx();
});
window.addEventListener('mouseup',()=>{isPan=false;});

// Touch pan
let t0=null;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){t0={x:e.touches[0].clientX-panX,y:e.touches[0].clientY-panY};}
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&t0){panX=e.touches[0].clientX-t0.x;panY=e.touches[0].clientY-t0.y;applyTx();}
},{passive:true});

// ═══ BUILD NODE ELEMENT ══════════════════════════════════════════
function makeEl(d, depth, isNew){
  const el = document.createElement('div');
  el.className='nd'+(depth===0?' nd-ceo':'')+(isNew?' nd-new':'');
  el.id='nd-'+d.id;

  const sz = avatarSize(depth);

  const ring=document.createElement('div');
  ring.className='av-wrap';

  const av=document.createElement('div');
  av.className='av';
  av.style.cssText=`width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.27)}px;background:#1c1c1c;`;

  if(d.logo){
    // Area logo: contain inside circle, transparent background
    const img=document.createElement('img');
    img.src=d.logo; img.alt=d.name;
    img.style.cssText='width:72%;height:72%;object-fit:contain;border-radius:0;display:block;margin:auto;';
    av.style.background='#111';
    av.appendChild(img);
  }else if(d.photo){
    const img=document.createElement('img');
    img.src=d.photo; img.alt=d.name;
    av.appendChild(img);
  }else{
    const ini=document.createElement('span');
    ini.className='ini'; ini.textContent=d.initials;
    av.appendChild(ini);
  }

  ring.appendChild(av);
  el.appendChild(ring);

  const lbl=document.createElement('div');
  lbl.className='lbl';
  lbl.innerHTML=`<div class="nm">${d.name}</div><div class="rl">${d.role}</div>`+(d.tag?`<div class="tg">${d.tag}</div>`:'');
  el.appendChild(lbl);

  if(d.children&&d.children.length>0){
    const exp=document.createElement('div');
    exp.className='exp'; exp.id='exp-'+d.id; exp.textContent='+';
    el.appendChild(exp);
    el.addEventListener('click',e=>{e.stopPropagation();toggle(d,depth);});
  }

  return el;
}

function placeEl(el,x,y){
  el.style.left=x+'px'; el.style.top=y+'px';
}

// ═══ LINES ════════════════════════════════════════════════════════
function drawLine(x1,y1,x2,y2,cls,id){
  const existing=document.getElementById('ln-'+id);
  if(existing)existing.remove();
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  // slight curve
  p.setAttribute('d',`M${x1},${y1} Q${mx},${my} ${x2},${y2}`);
  p.setAttribute('class',cls);
  p.id='ln-'+id;
  svgEl.appendChild(p);
}
function removeLine(id){const e=document.getElementById('ln-'+id);if(e)e.remove();}

// ═══ INIT ═════════════════════════════════════════════════════════
function init(){
  // Place CEO
  const ceoEl=makeEl(ORG,0,false);
  placeEl(ceoEl,0,0);
  nodeEls[ORG.id]=ceoEl;
  nodePos[ORG.id]={x:0,y:0};
  nodeData[ORG.id]=ORG;
  world.appendChild(ceoEl);

  // Auto-open CEO on load
  openSet.add(ORG.id);
  ceoEl.classList.add('open');
  const expEl=document.getElementById('exp-'+ORG.id);
  if(expEl)expEl.textContent='×';
  expandChildren(ORG, 0, 0, null, null, 1);
  applyTx();
}

// ═══ TOGGLE ══════════════════════════════════════════════════════
function toggle(d,depth){
  if(openSet.has(d.id)){
    collapse(d);
  }else{
    expand(d,depth);
  }
}

function expand(d,depth){
  openSet.add(d.id);
  const el=nodeEls[d.id];
  el.classList.add('open');
  const exp=document.getElementById('exp-'+d.id);
  if(exp)exp.textContent='×';
  const pos=nodePos[d.id];
  const parentPos=getParentPos(d.id);
  expandChildren(d, pos.x, pos.y, parentPos?parentPos.x:null, parentPos?parentPos.y:null, depth+1);
}

function expandChildren(d, ox, oy, px, py, childDepth){
  const children=d.children;
  const r=levelRadius(childDepth);
  children.forEach((child,i)=>{
    let pos;
    if(px===null||py===null){
      // full circle for top-level children of CEO
      pos=circlePos(ox,oy,r,i,children.length);
    }else{
      pos=arcPos(ox,oy,px,py,r,i,children.length);
    }
    nodePos[child.id]=pos;
    nodeData[child.id]=child;

    const cel=makeEl(child,childDepth,true);
    placeEl(cel,pos.x,pos.y);
    nodeEls[child.id]=cel;
    world.appendChild(cel);

    const lc=childDepth<=1?'l-main':'l-child';
    drawLine(ox,oy,pos.x,pos.y,lc,`${d.id}-${child.id}`);
  });
}

function collapse(d){
  openSet.delete(d.id);
  const el=nodeEls[d.id];
  el.classList.remove('open');
  const exp=document.getElementById('exp-'+d.id);
  if(exp)exp.textContent='+';
  collapseChildren(d);
}

function collapseChildren(d){
  d.children.forEach(child=>{
    if(openSet.has(child.id)) collapse(child);
    const cel=nodeEls[child.id];
    if(cel){cel.remove();delete nodeEls[child.id];}
    removeLine(`${d.id}-${child.id}`);
  });
}

// Parent position helper: find who drew the line to this id
function getParentPos(id){
  // Scan nodeData to find parent
  for(const [pid,d] of Object.entries(nodeData)){
    if(d.children&&d.children.some(c=>c.id===id)){
      return nodePos[pid]||null;
    }
  }
  return null;
}

// ═══ SPLASH ═══════════════════════════════════════════════════════
function dismissSplash(){
  const splash = document.getElementById('splash');
  splash.classList.add('fade-out');
  setTimeout(()=>{ splash.style.display='none'; }, 750);
}

// Animate logo in shortly after page load
window.addEventListener('load', ()=>{
  setTimeout(()=>{
    document.getElementById('splash-logo').classList.add('visible');
    document.getElementById('splash-hint').classList.add('visible');
  }, 120);
});

// ═══ START ════════════════════════════════════════════════════════
window.addEventListener('resize',()=>{W=window.innerWidth;H=window.innerHeight;cx=W/2;cy=H/2+24;applyTx();});
init();
</script>
